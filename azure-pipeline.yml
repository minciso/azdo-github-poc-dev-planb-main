trigger:
  - none

pool:
  vmImage: windows-latest

resources:
  repositories:
    - repository: github_repo
      type: github
      name: minciso/azdo-github-poc-dev-planb-main
      endpoint: Azdo-GitHub-reposync          # ← the OAuth service connection name

stages:
  - stage: AzdoToGitHubSync
    jobs:
      - job: GitSync
        steps:

          # Step 1: Checkout ADO source repo
          - checkout: self
            path: s/ado-source

          # Step 2: Checkout GitHub repo with OAuth credentials persisted
          - checkout: github_repo
            persistCredentials: true
            path: s/github-target

          # Step 3: Sync ADO content to GitHub and push
          - task: CmdLine@2
            displayName: 'Sync and Push to GitHub'
            inputs:
              script: |
                cd $(Pipeline.Workspace)\s\github-target

                git config user.email "minciso15@gmail.com"
                git config user.name "minciso"

                git checkout -b $(Build.SourceBranchName)

                REM --- Copy files from ADO repo into GitHub repo ---
                xcopy /E /Y /I "$(Pipeline.Workspace)\s\ado-source\*" "."

                git add --all

                REM --- Idempotency check: only commit and push if changes exist ---
                git diff --staged --quiet
                IF %ERRORLEVEL% NEQ 0 (
                  echo Changes detected, committing and pushing...
                  git commit -m "branch to main - $(Build.BuildNumber)"
                  git push --force origin HEAD:main
                ) ELSE (
                  echo No changes detected, repos are already in sync.
                )